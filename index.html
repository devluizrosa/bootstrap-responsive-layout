<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Site Bootstrap</title>

  <!-- Bootstrap 5 CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body class="bg-light">

  <!-- Header -->
  <header class="container-fluid bg-dark text-white text-center p-4 shadow">
    <h1>Meu Site Bootstrap</h1>
  </header>

  <!-- Main -->
  <main class="container my-5">

    <div class="row g-4">

      <!-- Coluna 1 -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="bg-primary text-white p-3 rounded shadow text-center">
          <h2>Coluna 1</h2>
          <p>
            Este é um exemplo de layout responsivo utilizando Bootstrap 5.
          </p>
        </div>
      </div>

      <!-- Coluna 2 -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="bg-success text-white p-3 rounded shadow text-center">
          <h2>Coluna 2</h2>
          <p>
            As colunas se adaptam automaticamente conforme o tamanho da tela.
          </p>
        </div>
      </div>

      <!-- Coluna 3 -->
      <div class="col-12 col-md-6 col-lg-4">
        <div class="bg-warning text-dark p-3 rounded shadow text-center">
          <h2>Coluna 3</h2>
          <p>
            Bootstrap facilita a criação de interfaces modernas e responsivas.
          </p>
        </div>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3">
    <p class="mb-0">Desenvolvido com Bootstrap 5</p>
  </footer>

</body>
</html>
